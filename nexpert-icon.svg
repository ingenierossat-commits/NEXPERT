<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9A45"/>
      <stop offset="100%" style="stop-color:#F47C20"/>
    </linearGradient>
  </defs>

  <!-- Fondo negro -->
  <rect x="0" y="0" width="512" height="512" rx="100" fill="#0D0D0D"/>

  <!-- NEX blanco -->
  <text x="30" y="310" font-size="112" fill="#FFFFFF" font-family="'Arial Black', Arial, sans-serif" font-weight="900" text-anchor="start" letter-spacing="-3">NEX</text>

  <!-- Máscara para tapar la X bajo la P -->
  <rect x="200" y="170" width="52" height="145" fill="#0D0D0D"/>

  <!-- PERT naranja -->
  <text x="200" y="310" font-size="112" fill="url(#orangeGrad)" font-family="'Arial Black', Arial, sans-serif" font-weight="900" text-anchor="start" letter-spacing="-3">PERT</text>

</svg>
